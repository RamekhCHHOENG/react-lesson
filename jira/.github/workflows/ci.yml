name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react-lesson/jira/frontend-reactjs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react-lesson/jira/frontend-reactjs/package-lock.json

      - run: npm ci

      - name: TypeScript check
        run: npx tsc -b --noEmit

      - name: Build
        run: npm run build

  backend:
    name: Backend - Lint & Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react-lesson/jira/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: react-lesson/jira/backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Check imports
        run: python -c "from app.models import *; from app.api.v1.router import api_router; print('All imports OK')"

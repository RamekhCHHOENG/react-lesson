services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./backend
    environment:
      APP_NAME: ProjectHub API
      APP_ENV: production
      API_V1_PREFIX: /api
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      DATABASE_URL: postgresql+psycopg://projecthub:${POSTGRES_PASSWORD:-projecthub}@postgres:5432/projecthub
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      FIRST_SUPERUSER_EMAIL: ${ADMIN_EMAIL:-admin@projecthub.com}
      FIRST_SUPERUSER_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      FIRST_SUPERUSER_NAME: ${ADMIN_NAME:-Admin User}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: projecthub
      POSTGRES_USER: projecthub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-projecthub}
    volumes:
      - projecthub_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projecthub -d projecthub"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - projecthub_redis_data:/data
    restart: unless-stopped

volumes:
  projecthub_postgres_data:
  projecthub_redis_data:
